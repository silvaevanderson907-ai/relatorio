<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Controle de Vendas - Carros</title>
  <link rel="icon" type="image/png" href="imagens/logo.jpeg">
  <link rel="shortcut icon" href="imagens/favicon-32.png">
  <link rel="apple-touch-icon" href="imagens/favicon-32.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="site-brand">
      <!-- logo image with fallback to inline SVG -->
      <img src="imagens/toyota-logo.png" alt="Toyota" class="logo" id="logo-img" onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='flex'">
      <div id="logo-fallback" style="display:none;align-items:center">
        <!-- fallback inline SVG -->
        <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" role="img" aria-label="logo">
          <rect width="120" height="40" fill="none"/>
          <g fill="none" stroke="#b30000" stroke-width="2">
            <path d="M6 26c4-8 14-12 26-12s22 4 28 12h18c3 0 6-3 8-6 2 3 5 6 8 6h6v4H6v-4z" fill="rgba(179,0,0,0.06)"/>
            <circle cx="30" cy="28" r="4" fill="#b30000"/>
            <circle cx="68" cy="28" r="4" fill="#b30000"/>
          </g>
        </svg>
      </div>
    </div>
  </header>
  <main class="container">

    <section class="form-section">
      <h2>Registrar venda</h2>
      <form id="sale-form">
        <label>Data
          <input type="date" id="sale-date" required>
        </label>
        <label>Marca
          <div class="select-wrapper">
            <!-- ícone da marca -->
            <svg class="icon-brand" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            </svg>
            <input list="brand-list" id="sale-brand" placeholder="Ex: Toyota" required class="input-select">
            <button type="button" class="clear-brand" title="Limpar marca" aria-label="Limpar marca">×</button>
          </div>
        </label>
        <label>Preço (R$)
          <input type="text" id="sale-price" step="0.01" min="0" required>
        </label>

        <!-- opções extras colocadas abaixo do preço (BDC / Captação / Placa premiada) -->
        <div class="inline-group">
          <label>BDC
            <select id="sale-bdc" class="select">
              <option value="Não">Não</option>
              <option value="Sim">Sim</option>
            </select>
          </label>
          <label>Captação
            <select id="sale-captacao" class="select">
              <option value="Não">Não</option>
              <option value="Sim">Sim</option>
            </select>
          </label>
          <label>Placa premiada
            <select id="sale-placa" class="select">
              <option value="Não">Não</option>
              <option value="Sim">Sim</option>
            </select>
          </label>
        </div>

        <!-- placas: carro vendido e carro captado -->
        <div class="inline-group">
          <label>Placa (venda)
            <input type="text" id="sale-plate-sold" placeholder="ABC1D23" class="input-plate">
          </label>
          <label>Placa (captada)
            <input type="text" id="sale-plate-captured" placeholder="ABC1D23" class="input-plate">
          </label>
        </div>

        <!-- novos campos solicitados -->
        <div class="inline-group">
          <label>Veículo
            <input list="vehicle-list" type="text" id="sale-vehicle" placeholder="Ex: Corolla XEI" class="input">
          </label>
          <label>Cliente
            <input type="text" id="sale-client" placeholder="Nome do cliente" class="input">
          </label>
        </div>

        <!-- datalists -->
        <datalist id="brand-list">
          <option value="Toyota">
          <option value="Volkswagen">
          <option value="Chevrolet">
          <option value="Fiat">
          <option value="Ford">
          <option value="Renault">
          <option value="Honda">
          <option value="Hyundai">
          <option value="Nissan">
          <option value="Jeep">
          <option value="Peugeot">
          <option value="Citroën">
          <option value="Mercedes-Benz">
          <option value="BMW">
          <option value="Audi">
        </datalist>
        <datalist id="vehicle-list"></datalist>

        <div class="inline-group">
          <label>Dias de estoque
            <input type="number" id="sale-days" min="0" value="0" class="input-compact">
          </label>
          <label>Forma de pagamento
            <select id="sale-payment" class="select">
              <option value="À vista">À vista</option>
              <option value="Financiamento">Financiamento</option>
              <option value="Consórcio">Consórcio</option>
              <option value="Carta C.">Carta C.</option>
              <option value="Troca">Troca</option>
              <option value="Outro">Outro</option>
            </select>
          </label>
        </div>

        <div class="inline-group">
          <label>% FIPE
            <div class="input-suffix">
              <input type="number" id="sale-fipe" step="0.01" min="0" max="100" class="input-compact" placeholder="0.00" value="0.00">
              <span class="suffix">%</span>
            </div>
          </label>
        </div>

        <label>Quantidade
          <input type="number" id="sale-qty" value="1" min="1" required>
        </label>
        <label>Vendedor
          <input type="text" id="sale-seller" placeholder="Nome" required>
        </label>

        <!-- Status removido do formulário; será editável apenas no relatório após cadastro -->

        <!-- campo de observações para cada venda -->
        <label>Observações
          <textarea id="sale-notes" placeholder="Anotações sobre a venda (ex: condições, devoluções, observações do cliente)" rows="3" style="width:100%;padding:8px;border-radius:8px;border:1px solid #e6edf2;background:#fff;color:var(--text);resize:vertical"></textarea>
        </label>
        <div class="actions">
          <button type="submit" class="btn">Registrar</button>
          <button type="button" id="clear-all" class="btn btn--muted">Limpar tudo</button>
        </div>
      </form>
    </section>

    <section class="report-section">
      <h2>Relatório mensal</h2>
      <label>Escolher mês
        <input type="month" id="report-month">
      </label>
      <label>Filtrar por status
        <select id="filter-status" aria-label="Filtrar por status">
          <option value="Todos">Todos</option>
          <option value="Pendente">Direcionados</option>
          <option value="Faturado">Faturados</option>
          <option value="Entregue">Entregues</option>
        </select>
      </label>
      <div class="summary">
        <p>Total de vendas: <strong id="summary-count">0</strong></p>
      </div>

      <div class="table-wrap">
        <table id="sales-table">
          <thead>
            <tr>
              <th>Data</th>
              <th>Veículo</th>
              <th>Marca</th>
              <th>Preço (R$)</th>
              <th>Qtde</th>
              <th>BDC</th>
              <th>Captação</th>
              <th>Placa venda</th>
              <th>Placa captação</th>
              <th>Cliente</th>
              <th>Dias estoque</th>
              <th>Pagamento</th>
              <th>% FIPE</th>
              <th>Vendedor</th>
              <th>Status</th>
              <th>Total</th>
              <th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-brand">
      <img src="imagens/toyota-logo.png" alt="Toyota" class="logo footer-logo">
      <div class="brand-text-footer">
        <h2>Concessionária — Controle de Vendas</h2>
        <p class="tagline">Relatório mensal</p>
      </div>
    </div>
    <p class="muted">&copy; <span id="year"></span> Concessionária. Todos os direitos reservados.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
